    <style>
        /* Global Styles */
        :root {
            --background: #1C1F2E;
            --foregroundPrimary: #A1BECAFF;
            --maxContrastColor: #275E7AFF;
            --foregroundSecondary: #7EB8D6FF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background);
            color: var(--foregroundPrimary);
            text-align: center;
            padding: 0;
            margin: 0;
        }

        header {
            position: fixed;
            top: 20px;
            left: 20px;
            display: block;
            justify-content: space-between;
            padding: 20px;
        }

        h1 {
            font-size: 1.8em;
            margin: 0;
            padding: 0;
        }

        .background {
            background-image: url("/background.png");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #iframe-container {
            width: 80%;
            height: 60%;
            border: 3px solid var(--maxContrastColor);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.4);
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .floating-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--foregroundPrimary);
            color: var(--background);
            font-size: 1.2em;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 1000;
        }

        .floating-button:hover {
            background-color: var(--foregroundSecondary);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            overflow: auto;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            height: 50%;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        /* Spinning loader styling */
        #loader {
            border: 8px solid #E7F2F7;
            border-top: 8px solid #7EB8D6;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preload" href="/background.png" as="image">
</head>

<body>
    <main>
        <!-- Background Image and Airtable Embed Section -->
        <div class="background">
            <header>
                <h1>Genshin Impact Codes for December 2024</h1>
                <p>Get the latest codes to unlock exclusive in-game rewards.</p>
                <!-- Floating Button to Add Code -->
                <button class="floating-button" id="myBtn">Submit a New Code</button>
            </header>
            <div id="loader"></div>
            <div id="iframe-container">
                <iframe src="https://airtable.com/embed/appWcSiS4PtBr5SES/shrRGz7ralypYiWgF?viewControls=on" 
                        title="Genshin Impact Codes" 
                        onload="showIframe()"
                        alt="Latest Genshin Impact Codes"></iframe>
            </div>
        </div>

        <!-- The Modal -->
        <div id="myModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <iframe src="https://airtable.com/embed/appWcSiS4PtBr5SES/pag2p8r0gopKtTdwN/form" 
                        title="Submit a New Code" 
                        height="400" 
                        style="border:none;" 
                        loading="lazy" 
                        alt="Submit Genshin Codes Form"></iframe>
            </div>
        </div>
    </main>

    <script>
        // Get modal and button elements
        var modal = document.getElementById("myModal");
        var btn = document.getElementById("myBtn");
        var span = document.getElementsByClassName("close")[0];

        // When the user clicks on the button, open the modal
        btn.onclick = function () {
            modal.style.display = "block";
        }

        // When the user clicks on <span> (x), close the modal
        span.onclick = function () {
            modal.style.display = "none";
        }

        // When the user clicks anywhere outside of the modal, close it
        window.onclick = function (event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        function showIframe() {
            document.getElementById("loader").style.display = "none";
            document.getElementById("iframe-container").style.display = "block";
        }
    </script>
</body>

</html>
