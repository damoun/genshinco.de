    <style>
        /* Global Styles */
        :root {
            --background: #1C1F2E;
            --foregroundPrimary: #A1BECAFF;
            --maxContrastColor: #275E7AFF;
            --foregroundSecondary: #7EB8D6FF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background);
            color: var(--foregroundPrimary);
            text-align: center;
            padding: 0;
            margin: 0;
        }

        .background {
            background-image: url("/background.png");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .iframe-container {
            width: 80%;
            height: 60%;
            border: 3px solid var(--maxContrastColor);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.4);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .floating-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--foregroundPrimary);
            color: var(--background);
            font-size: 1.2em;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 1000;
        }

        .floating-button:hover {
            background-color: var(--foregroundSecondary);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            overflow: auto;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            height: 50%;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Floating Button to Add Code -->
    <button class="floating-button" id="myBtn">Submit a new Code</button>

    <!-- Background Image and Airtable Embed Section -->
    <div class="background">
        <div class="iframe-container">
            <iframe src="https://airtable.com/embed/appWcSiS4PtBr5SES/shrCkwJOJQ0X5thDB" title="Genshin Impact Codes"></iframe>
        </div>
    </div>

    <!-- The Modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <iframe src="https://airtable.com/embed/appWcSiS4PtBr5SES/pag2p8r0gopKtTdwN/form" title="Submit a new Code" height="400" style="border:none;"></iframe>
        </div>
    </div>

    <script>
        // Get modal and button elements
        var modal = document.getElementById("myModal");
        var btn = document.getElementById("myBtn");
        var span = document.getElementsByClassName("close")[0];

        // When the user clicks on the button, open the modal
        btn.onclick = function () {
            modal.style.display = "block";
        }

        // When the user clicks on <span> (x), close the modal
        span.onclick = function () {
            modal.style.display = "none";
        }

        // When the user clicks anywhere outside of the modal, close it
        window.onclick = function (event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>

</html>
