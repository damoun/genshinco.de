name: Fetch Genshin Codes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Fetch codes
        run: python scripts/fetch_codes.py

      - name: Verify codes.json size
        run: |
          size=$(wc -c < codes.json)
          if [ "$size" -gt 2048 ]; then
            echo "ERROR: codes.json exceeds 2KB ($size bytes)" >&2
            exit 1
          fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet codes.json; then
            echo "No changes to codes.json"
            exit 0
          fi
          sed -i "0,/<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}<\/lastmod>/s/<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}<\/lastmod>/<lastmod>$(date -u +%Y-%m-%d)<\/lastmod>/" sitemap.xml
          git add codes.json sitemap.xml
          staged=$(git diff --cached --name-only)
          if [ -n "$staged" ] && [ "$staged" != "codes.json" ] && [ "$staged" != "sitemap.xml" ] && [ "$staged" != "$(printf 'codes.json\nsitemap.xml')" ]; then
            echo "ERROR: unexpected staged files: $staged" >&2
            git reset
            exit 1
          fi
          git commit -m "chore: update codes.json"
          git push
